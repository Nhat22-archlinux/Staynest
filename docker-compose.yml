services:
  mongodb:
    image: mongo:7
    container_name: staynest_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: yourStrongPassword
    volumes:
      - ./mongo-data:/data/db

  backend:
    build:
      context: ./backend
    container_name: staynest_backend
    restart: unless-stopped
    expose:
      - "5000"
    depends_on:
      - mongodb
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:yourStrongPassword@192.168.2.110:27015/homestay_db?authSource=admin
      FRONTEND_URL: https://staynest.nniisworking1606.id.vn
      GOOGLE_CALLBACK_URL: https://staynest.nniisworking1606.id.vn/api/auth/google/callback
      CORS_ORIGIN: https://staynest.nniisworking1606.id.vn,http://192.168.2.110:4173,http://localhost:4173,http://localhost:5173
      JWT_SECRET: ${JWT_SECRET:-replace_this_with_a_long_random_secret}
      SESSION_SECRET: ${SESSION_SECRET:-replace_this_with_a_long_random_session_secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}

  frontend:
    build:
      context: .
      args:
        VITE_API_URL: /api
        VITE_APP_VERSION: 0.1.0
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
    container_name: staynest_frontend
    restart: unless-stopped
    ports:
      - "4173:80"
    depends_on:
      - backend
